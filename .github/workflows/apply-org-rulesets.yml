name: Apply Org Rulesets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List existing rulesets without creating (true/false)'
        required: false
        default: 'false'
        type: boolean

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          annotations: true
          min-severity: error

  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: clouatre-labs

      - name: Apply org rulesets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          chmod +x scripts/apply-org-rulesets.sh
          scripts/apply-org-rulesets.sh "${{ inputs.dry_run == true && 'true' || 'false' }}"
